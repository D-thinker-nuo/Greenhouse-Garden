<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hover 3D Grow</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <main id="sketch-holder" aria-label="Interactive 3D garden"></main>
    <section id="garden-controls" aria-label="Garden controls">
      <label for="density-slider">
        <span>Density</span>
        <output id="density-value" for="density-slider">1.0x</output>
      </label>
      <input id="density-slider" type="range" min="0.5" max="2.2" step="0.1" value="1" aria-label="Flower point density">
    </section>
    <button id="sound-toggle" type="button" aria-label="Enable sound">Sound</button>
    <div id="status-chip">Hover the buds</div>
  </body>
</html>
